  <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation | Sourabh & Dipti</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600&family=Montserrat:wght@300;400&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c5a059;
            --rose-dark: #8e5d56;
            --bg-cream: #fffaf5;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #fdf8f5;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated Background Petals */
        .petal {
            position: fixed;
            background-color: #ffd1d1;
            border-radius: 150% 0 150% 0;
            opacity: 0.3;
            pointer-events: none;
            z-index: 0;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        .card {
            position: relative;
            width: 90%;
            max-width: 450px;
            background: white;
            padding: 40px 20px;
            box-shadow: 0 20px 50px rgba(142, 93, 86, 0.15);
            border-radius: 2px;
            text-align: center;
            z-index: 1;
            border: 1px solid #eee;
            animation: cardEntry 1.5s ease-out forwards;
        }

        /* Border Frame Animation */
        .card::before {
            content: '';
            position: absolute;
            top: 15px; left: 15px; right: 15px; bottom: 15px;
            border: 1px solid var(--gold);
            opacity: 0;
            animation: borderFade 2s ease-out 0.5s forwards;
        }

        @keyframes cardEntry {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes borderFade {
            from { opacity: 0; transform: scale(1.05); }
            to { opacity: 1; transform: scale(1); }
        }

        .header-text {
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--rose-dark);
            margin-bottom: 30px;
            opacity: 0;
            animation: fadeInUp 1s ease forwards 1s;
        }

        .names {
            font-family: 'Cormorant Garamond', serif;
            font-size: 42px;
            color: var(--gold);
            margin: 10px 0;
            opacity: 0;
            animation: fadeInUp 1s ease forwards 1.3s;
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fcf6ba, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: fadeInUp 1s ease forwards 1.3s, shimmer 4s linear infinite;
        }

        .ampersand {
            font-family: 'Great Vibes', cursive;
            font-size: 30px;
            display: block;
            margin: 5px 0;
            color: var(--rose-dark);
            -webkit-text-fill-color: var(--rose-dark);
        }

        .event-title {
            font-weight: 400;
            font-size: 20px;
            margin: 30px 0 10px;
            color: #333;
            opacity: 0;
            animation: fadeInUp 1s ease forwards 1.6s;
        }

        .details {
            font-size: 14px;
            line-height: 1.8;
            color: #666;
            opacity: 0;
            animation: fadeInUp 1s ease forwards 1.9s;
        }

        .venue {
            margin-top: 25px;
            font-weight: 500;
            color: #444;
            opacity: 0;
            animation: fadeInUp 1s ease forwards 2.2s;
        }

        .footer-credit {
            margin-top: 40px;
            font-size: 10px;
            color: #aaa;
            opacity: 0;
            animation: fadeIn 1s ease forwards 2.5s;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        @keyframes shimmer {
            to { background-position: 200% center; }
        }

        /* Decorative Flowers */
        .corner-flower {
            position: absolute;
            width: 100px;
            opacity: 0;
            animation: fadeIn 2s ease forwards 0.8s;
        }
        .top-left { top: -20px; left: -20px; transform: rotate(-10deg); }
        .bottom-right { bottom: -20px; right: -20px; transform: rotate(170deg); }

    </style>
</head>
<body>

    <script>
        for (let i = 0; i < 15; i++) {
            let petal = document.createElement('div');
            petal.className = 'petal';
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.width = Math.random() * 15 + 10 + 'px';
            petal.style.height = petal.style.width;
            petal.style.animationDuration = Math.random() * 5 + 5 + 's';
            petal.style.animationDelay = Math.random() * 5 + 's';
            document.body.appendChild(petal);
        }
    </script>

    <div class="card">
        <svg class="corner-flower top-left" viewBox="0 0 100 100">
            <path fill="#ffd1d1" d="M50 50 Q70 10 90 50 T50 90 T10 50 T50 10" opacity="0.6"/>
        </svg>

        <div class="header-text">Together with their families</div>
        
        <div class="names">
            SOURABH
            <span class="ampersand">&</span>
            DIPTI
        </div>

        <div class="event-title">Invite you to their Wedding Ceremony</div>

        <div class="details">
            <strong>TUESDAY, APRIL 21, 2026</strong><br>
            At 12:21 PM
        </div>

        <div class="venue">
            VENUE<br>
            Gumat Patil Sah. Pani Purvatha Sanstha No.1<br>
            Near Atithi Garden, Sangli - Nandre Road
        </div>

        <svg class="corner-flower bottom-right" viewBox="0 0 100 100">
            <path fill="#ffd1d1" d="M50 50 Q70 10 90 50 T50 90 T10 50 T50 10" opacity="0.6"/>
        </svg>
    </div>

</body>
</html>
