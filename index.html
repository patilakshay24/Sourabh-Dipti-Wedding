<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Wedding Invitation</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Montserrat:wght@300;400;500;600&display=swap');

        :root {
            --color-gold: #c9a66b;
            --color-rose-gold-dark: #b8867f;
            --color-rose-gold-light: #f5ddd8;
            --color-text-body: #333333;
            --color-text-accent: #666666;
            --font-gold: 'Cormorant Garamond', serif;
            --font-sans: 'Montserrat', sans-serif;
            --ani-duration: 0.5s;
        }

        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f7f7f7;
            overflow: hidden;
            font-family: var(--font-sans);
            color: var(--color-text-body);
        }

        #invitation-container {
            position: relative;
            width: 400px;
            height: 600px;
            background-color: #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            animation: fadeIn 0.5s ease-out 0s forwards;
        }

        /* Subtle background rose texture */
        #invitation-container::before {
            content: '';
            position: absolute;
            top: 10%;
            right: -10px;
            width: 200px;
            height: 300px;
            /* Placeholder for right-side watercolor rose image */
            background-color: rgba(255, 192, 203, 0.1); 
            background-image: url('data:image/svg+xml;utf8,<svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg"><circle cx="50%" cy="50%" r="40%" stroke="rgba(255,192,203,0.3)" stroke-width="2" fill="none" /></svg>');
            background-size: cover;
            border-radius: 100%;
            filter: blur(10px);
            opacity: 0;
            animation: fadeIn 1s ease-out 0.5s forwards;
        }

        /* Metallic Frame - Forms first */
        #frame {
            position: absolute;
            top: 25px;
            left: 25px;
            right: 25px;
            bottom: 25px;
            border: 2px solid;
            border-image: linear-gradient(135deg, var(--color-rose-gold-light), var(--color-rose-gold-dark), var(--color-rose-gold-light)) 1;
            box-sizing: border-box;
            width: 0%;
            height: 0%;
            left: 50%;
            top: 50%;
            opacity: 0;
            animation: formFrame 1s cubic-bezier(0.19, 1, 0.22, 1) 0.5s forwards;
        }

        @keyframes formFrame {
            0% {
                width: 0%;
                height: 0%;
                left: 50%;
                top: 50%;
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            100% {
                width: calc(100% - 50px);
                height: calc(100% - 50px);
                left: 25px;
                top: 25px;
                opacity: 1;
            }
        }

        /* Leaf sprigs from corners */
        .leaf {
            position: absolute;
            opacity: 0;
            z-index: 5;
            background-size: contain;
            background-repeat: no-repeat;
        }

        #leaf-top-left {
            top: -20px;
            left: -20px;
            width: 80px;
            height: 80px;
            /* Placeholder for leaf sprig top-left */
            background-color: rgba(180, 190, 180, 0.2); 
            border-radius: 50% 0 50% 50%;
            animation: leafFloatIn 1.5s cubic-bezier(0.19, 1, 0.22, 1) 1.5s forwards;
        }

        #leaf-top-right {
            top: -15px;
            right: 20px;
            width: 70px;
            height: 70px;
            /* Placeholder for leaf sprig top-right */
            background-color: rgba(180, 190, 180, 0.15); 
            border-radius: 50% 50% 0 50%;
            transform: scaleX(-1);
            animation: leafFloatIn 1.5s cubic-bezier(0.19, 1, 0.22, 1) 1.5s forwards;
        }

        @keyframes leafFloatIn {
            0% {
                opacity: 0;
                transform: translate(0, -20px) scale(0.5);
            }
            100% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
        }

        /* Bottom floral bouquet bloom */
        #flower-bouquet {
            position: absolute;
            bottom: -30px;
            right: -20px;
            width: 180px;
            height: 180px;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: none; /* controlled by children */
        }

        .flower-part {
            position: absolute;
            border-radius: 100%;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
            opacity: 0;
            transform: scale(0);
        }

        #blue-flower {
            width: 60px;
            height: 60px;
            bottom: 60px;
            right: 15px;
            background-color: #cadff1;
            z-index: 11;
            animation: bloom 1s ease-out 2.5s forwards;
        }

        #peach-flower {
            width: 80px;
            height: 80px;
            bottom: 15px;
            right: 50px;
            background-color: #fbd6c6;
            z-index: 12;
            animation: bloom 1s ease-out 2.8s forwards;
        }

        #pink-flower {
            width: 65px;
            height: 65px;
            bottom: 45px;
            right: -5px;
            background-color: #fad3d9;
            z-index: 13;
            animation: bloom 1s ease-out 3.1s forwards;
        }

        .flower-leaf {
            position: absolute;
            width: 40px;
            height: 20px;
            background-color: #8fae9b;
            border-radius: 100% 0;
            transform: scale(0);
            opacity: 0;
        }

        @keyframes bloom {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes flowerLeaf {
            0% {
                transform: scale(0) rotate(0deg);
                opacity: 0;
            }
            100% {
                transform: scale(1) rotate(20deg);
                opacity: 1;
            }
        }

        /* Text Styles */
        #invitation-container * {
            box-sizing: border-box;
            text-align: center;
            width: calc(100% - 100px);
            margin-left: auto;
            margin-right: auto;
            opacity: 0;
        }

        #text-content {
            padding: 50px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            margin-top: 30px;
            z-index: 2;
        }

        #together {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
            color: var(--color-text-accent);
            animation: fadeIn 1s ease-out 1.5s forwards;
        }

        #names {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 5px;
            animation: none; /* Handled by children */
            height: 100px;
        }

        #names h1, #names span {
            display: inline-block;
            opacity: 0;
        }

        #sourabh, #dipti {
            font-family: var(--font-gold);
            font-weight: 600;
            font-size: 38px;
            margin: 0;
            background: linear-gradient(135deg, #c9a66b, #b8867f, #c9a66b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 1px 1px rgba(0,0,0,0.1);
            animation: namesBloom 1s ease-out 2s forwards, goldShimmer 3s ease-in-out 3s infinite;
        }

        #ampersand {
            font-family: var(--font-gold);
            font-size: 32px;
            color: var(--color-gold);
            margin: 0 10px;
            animation: fadeIn 1s ease-out 2s forwards;
        }

        @keyframes namesBloom {
            0% {
                opacity: 0;
                transform: scale(0.9);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes goldShimmer {
            0% {
                background-position: -200%;
            }
            100% {
                background-position: 200%;
            }
        }

        #invite {
            font-size: 10px;
            color: var(--color-text-accent);
            margin-top: 20px;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            animation: fadeIn 1s ease-out 2.5s forwards;
        }

        #wedding {
            font-size: 20px;
            font-weight: 600;
            color: #2b3a42;
            margin-bottom: 30px;
            animation: floatUp 1s ease-out 2.8s forwards;
        }

        #date-label, #venue-label {
            font-size: 10px;
            font-weight: 600;
            color: var(--color-text-accent);
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        #date {
            margin-bottom: 25px;
        }
        #date-label {
            animation: fadeIn 1s ease-out 3s forwards;
        }
        #date-detail {
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.5px;
            animation: floatUp 1s ease-out 3.2s forwards;
        }

        #venue {
            margin-bottom: 20px;
        }
        #venue-label {
            animation: fadeIn 1s ease-out 3.5s forwards;
        }
        #venue-detail {
            font-size: 11px;
            line-height: 1.6;
            margin-bottom: 0px;
            animation: floatUp 1s ease-out 3.7s forwards;
        }

        /* Footer */
        #footer {
            position: absolute;
            bottom: 35px;
            left: 50px;
            width: auto;
            text-align: left;
            margin: 0;
            font-size: 8.5px;
            color: rgba(102, 102, 102, 0.7);
            line-height: 1.4;
            animation: fadeIn 1s ease-out 4.2s forwards;
            z-index: 10;
        }

        /* Keyframes */
        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        @keyframes floatUp {
            0% {
                opacity: 0;
                transform: translateY(15px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div id="invitation-container">
        <div id="frame"></div>
        <div class="leaf" id="leaf-top-left"></div>
        <div class="leaf" id="leaf-top-right"></div>

        <div id="text-content">
            <p id="together">Together with their families</p>
            <div id="names">
                <h1 id="sourabh">Sourabh</h1>
                <span id="ampersand">&</span>
                <h1 id="dipti">Dipti</h1>
            </div>
            <p id="invite">Invite you to their</p>
            <h2 id="wedding">Wedding Ceremony</h2>

            <div id="date">
                <p id="date-label">Date</p>
                <p id="date-detail">TUESDAY, APRIL 21, 2026 AT 12:21 PM.</p>
            </div>

            <div id="venue">
                <p id="venue-label">Venue</p>
                <p id="venue-detail">
                    Gumat Patil Sah.Pani Purvatha Sanstha No.1<br>
                    Near Atithi Garden,<br>
                    Sangli - Nandre Road, Nandre
                </p>
            </div>
        </div>

        <div id="flower-bouquet">
            <div class="flower-leaf" style="bottom:20px; right: 90px; transform-origin: 100% 100%; animation: flowerLeaf 1s ease-out 2.6s forwards"></div>
            <div class="flower-part" id="blue-flower"></div>
            <div class="flower-leaf" style="bottom:60px; right: 80px; transform-origin: 100% 0%; animation: flowerLeaf 1s ease-out 2.9s forwards"></div>
            <div class="flower-part" id="peach-flower"></div>
            <div class="flower-leaf" style="bottom:40px; right: 20px; transform-origin: 0% 100%; transform: rotate(-20deg) scale(0); animation: flowerLeaf 1s ease-out 3.2s forwards"></div>
            <div class="flower-part" id="pink-flower"></div>
        </div>

        <p id="footer">
            Ankur Photo & Films<br>
            Nandre. 9850534438
        </p>
    </div>
</body>
</html>
